version: 2
number: 1
title: "ما هو دوكر؟"
description: "مقدمة في تقنية الحاويات ولماذا أحدث دوكر ثورة في تطوير البرمجيات."
sections:
  - title: "المشكلة بدون الحاويات"
    explanation: |
      تخيل أنك تطور تطبيقاً على حاسوبك المحمول. كل شيء يعمل بشكل مثالي. ثم تعطيه لزميلك — و**لا شيء يعمل**. إصدار مختلف من Python، مكتبات مفقودة، نظام تشغيل مختلف.

      هذه المشكلة تُعرف بـ **"Works on my machine"** (يعمل على جهازي) وهي من أكثر الإحباطات شيوعاً في تطوير البرمجيات.

      **دوكر يحل هذه المشكلة بالضبط.** فهو يُغلّف تطبيقك مع كل ما يحتاجه في **حاوية** — بيئة محمولة ومعزولة.
    examples:
      - q: "ما هي مشكلة 'Works on my machine'؟"
        a: "التطبيق يعمل على جهاز المطور لكنه لا يعمل على أنظمة أخرى بسبب اختلاف الاعتماديات أو الإعدادات."
        labels: ["أساسيات"]
        rel:
          - ["works-on-my-machine", "klassisches Deployment-Problem", "Motivation für Container"]
      - q: "ماذا يُغلّف دوكر في الحاوية؟"
        a: "التطبيق بالإضافة إلى جميع الاعتماديات (المكتبات، بيئة التشغيل، الإعدادات) — كل ما يلزم للتشغيل."
        labels: ["أساسيات"]
        rel:
          - ["container-inhalt", "App + Abhängigkeiten", "Docker-Container"]
      - q: "لماذا عبارة 'إنه يعمل عندي' ليست مفيدة في الفريق؟"
        a: "لأن البيئة يمكن أن تختلف على كل جهاز — دوكر يضمن أن تكون البيئة متطابقة في كل مكان."
        labels: ["أساسيات"]
        rel:
          - ["umgebung-konsistenz", "identische Umgebungen", "Docker-Vorteil"]

  - title: "الحاويات مقابل الأجهزة الافتراضية"
    explanation: |
      ربما تفكر: *"أليست الأجهزة الافتراضية (VMs) موجودة لذلك؟"* — نعم، لكن الحاويات **أخف بكثير**.

      | الخاصية | الجهاز الافتراضي | الحاوية |
      |---|---|---|
      | وقت البدء | دقائق | ثوانٍ |
      | الحجم | غيغابايت | ميغابايت |
      | نظام التشغيل | نظام ضيف خاص | يتشارك نواة المضيف |
      | العزل | كامل | على مستوى العملية |
      | الموارد | ثقيلة | خفيفة |

      الجهاز الافتراضي يحاكي جهاز كامل بنظام تشغيل خاص. الحاوية **تتشارك نواة المضيف** وتعزل التطبيق فقط. لذلك تبدأ الحاويات في ثوانٍ بدلاً من دقائق.
    examples:
      - q: "لماذا تبدأ الحاويات أسرع من الأجهزة الافتراضية؟"
        a: "الحاويات تتشارك نواة نظام التشغيل المضيف ولا تحتاج لتشغيل نظام تشغيل خاص — يتم تشغيل التطبيق فقط."
        labels: ["أساسيات"]
        rel:
          - ["container-vs-vm-start", "Kernel-Sharing", "Performance-Vorteil"]
      - q: "كم من المساحة تحتاج الحاوية مقارنة بالجهاز الافتراضي؟"
        a: "الحاويات تحتاج عادة ميغابايت فقط، بينما الأجهزة الافتراضية تحتاج عدة غيغابايت لأنها تتضمن نظام تشغيل ضيف كامل."
        labels: ["أساسيات"]
        rel:
          - ["container-groesse", "MB vs. GB", "Ressourcenverbrauch"]
      - q: "هل يمكن تشغيل حاويات أكثر أم أجهزة افتراضية أكثر على خادم واحد؟"
        a: "حاويات أكثر بكثير — لأنها تستهلك موارد أقل وتتشارك النواة، يمكن تشغيل مئات الحاويات على خادم لا يتحمل سوى عدد قليل من الأجهزة الافتراضية."
        labels: ["أساسيات"]
        rel:
          - ["container-dichte", "hunderte vs. wenige", "Server-Kapazität"]

  - title: "بنية دوكر"
    explanation: |
      يتكون دوكر من ثلاثة مكونات رئيسية:

      1. **Docker Daemon (dockerd)** — الخدمة التي تعمل في الخلفية وتقوم بإنشاء وإدارة الحاويات
      2. **Docker CLI** — أداة سطر الأوامر التي تُدخل من خلالها الأوامر
      3. **Docker Registry** — مكان تخزين الصور (مثل Docker Hub)

      العملية بسيطة:
      - تُدخل أمراً (مثل `docker run nginx`)
      - يُرسل CLI الأمر إلى الـ Daemon
      - يُحمّل الـ Daemon الصورة (إذا لزم الأمر) من الـ Registry
      - يُنشئ الـ Daemon الحاوية ويُشغّلها

      **معلومة طريفة:** سُمّي دوكر على اسم عمال الموانئ الذين يُحمّلون الحاويات على السفن — وهذا بالضبط ما يفعله دوكر مع البرمجيات!
    examples:
      - q: "docker run nginx"
        a: "يُحمّل صورة nginx من Docker Hub (إذا لم تكن موجودة) ويُشغّل حاوية منها."
        labels: ["البنية"]
        rel:
          - ["docker-run-flow", "Image laden → Container starten", "Docker-Ablauf"]
      - q: "ماذا يفعل Docker Daemon؟"
        a: "هو الخدمة التي تعمل في الخلفية (dockerd) وتدير الصور وتُنشئ وتُشغّل وتُراقب الحاويات."
        labels: ["البنية"]
        rel:
          - ["docker-daemon", "Hintergrund-Service", "Kernkomponente"]
      - q: "ما هو Docker Hub؟"
        a: "الـ Registry الافتراضي لدوكر — مستودع عام يحتوي على آلاف الصور الجاهزة مثل nginx و postgres و node و python وغيرها."
        labels: ["البنية"]
        rel:
          - ["docker-hub", "öffentliche Registry", "Image-Quelle"]

  - title: "مصطلحات دوكر المهمة"
    explanation: |
      قبل أن نبدأ، إليك أهم المصطلحات:

      - **الصورة (Image):** قالب للقراءة فقط يحتوي على كل ما يحتاجه التطبيق. مثل الوصفة.
      - **الحاوية (Container):** نسخة عاملة من الصورة. مثل الطبق الجاهز من الوصفة.
      - **Dockerfile:** ملف نصي يحتوي على تعليمات لبناء الصورة. مثل دليل الطبخ.
      - **Registry:** مكان تخزين الصور (مثل Docker Hub).
      - **Volume:** تخزين دائم لبيانات الحاوية.
      - **Layer:** الصور تتكون من طبقات — كل تعليمة في Dockerfile تُنشئ طبقة جديدة.

      تذكر: **الصورة = المخطط، الحاوية = المبنى**. من صورة واحدة يمكنك إنشاء عدد لا نهائي من الحاويات.
    examples:
      - q: "ما الفرق بين الصورة والحاوية؟"
        a: "الصورة هي القالب للقراءة فقط (المخطط)، والحاوية هي نسخة عاملة منها (المبنى). من صورة واحدة يمكن إنشاء حاويات عديدة."
        labels: ["مصطلحات"]
        rel:
          - ["image-vs-container", "Bauplan vs. Gebäude", "Kernkonzept"]
      - q: "ما هو Dockerfile؟"
        a: "ملف نصي يحتوي على تعليمات خطوة بخطوة تصف كيفية بناء صورة دوكر."
        labels: ["مصطلحات"]
        rel:
          - ["dockerfile-def", "Build-Anleitung", "Image-Erstellung"]
      - q: "لماذا تتكون الصور من طبقات؟"
        a: "كل تعليمة في Dockerfile تُنشئ طبقة. بفضل التخزين المؤقت (Caching) لا يلزم إعادة بناء سوى الطبقات المتأثرة عند التعديل — مما يوفر الوقت والمساحة."
        labels: ["مصطلحات"]
        rel:
          - ["image-layers", "Caching-Vorteil", "Build-Optimierung"]

