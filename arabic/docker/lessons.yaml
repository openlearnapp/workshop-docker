lessons:
  - folder: "01-ما-هو-دوكر"
    title: "ما هو دوكر؟"
    description: "مقدمة في تقنية الحاويات ولماذا أحدث دوكر ثورة في تطوير البرمجيات."
  - folder: "02-التثبيت-والبداية"
    title: "التثبيت والخطوات الأولى"
    description: "تثبيت دوكر وتشغيل أول حاوية."
  - folder: "03-صور-دوكر"
    title: "فهم صور دوكر"
    description: "ما هي الصور وكيف تجدها وكيف تعمل الطبقات؟"
  - folder: "04-كتابة-ملف-دوكر"
    title: "كتابة Dockerfile"
    description: "إنشاء وتحسين صور دوكر الخاصة بك باستخدام Dockerfile."
  - folder: "05-إدارة-الحاويات"
    title: "إدارة الحاويات"
    description: "تشغيل وإيقاف وفحص الحاويات وقراءة السجلات."
  - folder: "06-وحدات-التخزين"
    title: "وحدات التخزين وثبات البيانات"
    description: "تخزين البيانات بشكل دائم في دوكر باستخدام Volumes و Bind Mounts."
  - folder: "07-شبكات-دوكر"
    title: "شبكات دوكر"
    description: "ربط الحاويات ببعضها وفهم أساسيات الشبكات."
  - folder: "08-أساسيات-دوكر-كومبوز"
    title: "أساسيات دوكر كومبوز"
    description: "مقدمة في دوكر كومبوز وصيغة docker-compose.yaml."
  - folder: "09-خدمات-كومبوز"
    title: "خدمات كومبوز"
    description: "تعريف وتكوين والتحكم في الخدمات باستخدام متغيرات البيئة."
  - folder: "10-شبكات-ووحدات-كومبوز"
    title: "كومبوز: الشبكات ووحدات التخزين"
    description: "تكوين الشبكات ووحدات التخزين في دوكر كومبوز."
  - folder: "11-تطبيقات-متعددة-الحاويات"
    title: "تطبيقات متعددة الحاويات"
    description: "بناء وإدارة تطبيق كامل مع خدمات متعددة."
  - folder: "12-أفضل-الممارسات"
    title: "أفضل الممارسات والإنتاج"
    description: "تحسين دوكر وكومبوز للاستخدام في بيئة الإنتاج."
