          - text: "الأمان — قاعدة البيانات ليست قابلة للوصول مباشرة من خادم الويب"
            correct: true
          - text: "الأداء — الشبكات المنفصلة أسرع"
          - text: "دوكر يدعم شبكة واحدة فقط مع 5 حاويات"
          - text: "هي إعداد إلزامي في docker-compose.yaml"
      - q: "أي من العبارات التالية عن وحدات التخزين في كومبوز صحيحة؟"
        type: multiple-choice
        options:
          - text: "Named Volumes تُصرَّح تحت 'volumes:' في نهاية الملف"
            correct: true
          - text: ":ro يجعل التركيب للقراءة فقط"
            correct: true
          - text: "'docker compose down' يحذف Named Volumes"
          - text: "عدة خدمات يمكنها استخدام نفس وحدة التخزين"
            correct: true
      - q: "كيف يستخدم مشروع كومبوز شبكة أُنشئت خارجياً؟"
        type: input
        a:
          - "external: true"
          - "external"
