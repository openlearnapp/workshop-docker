        type: multiple-choice
        options:
          - text: "Containers start in seconds"
            correct: true
          - text: "An image is a running instance"
          - text: "Docker Hub is a public registry"
            correct: true
          - text: "Containers need their own operating system"
      - q: "What is the relationship between image and container?"
        type: select
        options:
          - text: "Image = blueprint, Container = running instance"
            correct: true
          - text: "Container = blueprint, Image = running instance"
          - text: "Both are the same thing"
          - text: "Images only exist on Docker Hub"
