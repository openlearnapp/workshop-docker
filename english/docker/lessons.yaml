lessons:
  - folder: "01-what-is-docker"
    title: "What is Docker?"
    description: "Introduction to container technology and why Docker revolutionized software development."
  - folder: "02-installation-and-first-steps"
    title: "Installation & First Steps"
    description: "Install Docker and run your first container."
  - folder: "03-docker-images"
    title: "Understanding Docker Images"
    description: "What are images, how to find them, and how do layers work?"
  - folder: "04-writing-dockerfiles"
    title: "Writing Dockerfiles"
    description: "Create and optimize your own Docker images with a Dockerfile."
  - folder: "05-container-management"
    title: "Container Management"
    description: "Start, stop, inspect containers and read logs."
  - folder: "06-volumes-and-persistence"
    title: "Volumes & Data Persistence"
    description: "Persist data in Docker using volumes and bind mounts."
  - folder: "07-docker-networking"
    title: "Docker Networking"
    description: "Connect containers and understand networking fundamentals."
  - folder: "08-docker-compose-basics"
    title: "Docker Compose Basics"
    description: "Introduction to Docker Compose and the docker-compose.yaml syntax."
  - folder: "09-compose-services"
    title: "Compose Services"
    description: "Define, configure, and control services with environment variables."
  - folder: "10-compose-networks-and-volumes"
    title: "Compose: Networks & Volumes"
    description: "Configure networks and volumes in Docker Compose."
  - folder: "11-multi-container-apps"
    title: "Multi-Container Applications"
    description: "Build and orchestrate a complete app with multiple services."
  - folder: "12-best-practices"
    title: "Best Practices & Production"
    description: "Optimize Docker and Compose for production use."
