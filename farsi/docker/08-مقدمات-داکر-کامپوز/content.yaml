version: 2
number: 8
title: "مقدمات داکر کامپوز"
description: "آشنایی با داکر کامپوز و سینتکس docker-compose.yaml."
sections:
  - title: "چرا داکر کامپوز؟"
    explanation: |
      در درس قبلی دیدید که چگونه چندین کانتینر را به صورت دستی اجرا کنید — ایجاد شبکه، اجرای تک‌تک کانتینرها، تنظیم متغیرهای محیطی...

      با ۲ کانتینر ممکن است. با ۵ یا ۱۰ کانتینر؟ **یک کابوس.**

      **داکر کامپوز** این مشکل را حل می‌کند: کل اپلیکیشن خود را در **یک فایل YAML** توصیف و همه چیز را با **یک دستور** اجرا می‌کنید:

      ```bash
      docker compose up
      ```

      کامپوز به صورت خودکار ایجاد می‌کند:
      - همه کانتینرها (سرویس‌ها)
      - یک شبکه مشترک
      - همه والیوم‌ها
      - ترتیب صحیح اجرا
    examples:
      - q: "مزیت اصلی داکر کامپوز چیست؟"
        a: "تعریف کل اپلیکیشن چند کانتینری در یک فایل و اجرای آن با یک دستور — به جای تایپ ده‌ها دستور docker run."
        labels: ["کامپوز"]
        rel:
          - ["compose-vorteil", "پیکربندی اعلانی", "اجرا با یک دستور"]
      - q: "docker compose up"
        a: "همه سرویس‌های تعریف‌شده در docker-compose.yaml را اجرا می‌کند. به صورت خودکار شبکه‌ها و والیوم‌ها ایجاد می‌شوند. بدون -d در پیش‌زمینه با لاگ‌های ترکیبی اجرا می‌شود."
        labels: ["کامپوز"]
        rel:
          - ["compose-up", "اجرای همه", "دستور اصلی"]
      - q: "آیا داکر کامپوز به صورت خودکار شبکه ایجاد می‌کند؟"
        a: "بله! کامپوز به صورت خودکار شبکه‌ای به نام <نام‌پوشه‌پروژه>_default ایجاد می‌کند. همه سرویس‌ها از طریق نام سرویس خود به یکدیگر دسترسی دارند."
        labels: ["کامپوز"]
        rel:
          - ["compose-default-network", "شبکه خودکار", "DNS سرویس"]

  - title: "فایل docker-compose.yaml"
    explanation: |
      یک نمونه کامل از `docker-compose.yaml`:

      ```yaml
      services:
        web:
          image: nginx:alpine
          ports:
            - "8080:80"
          volumes:
            - ./html:/usr/share/nginx/html
          depends_on:
            - api

        api:
          build: ./api
          ports:
            - "3000:3000"
          environment:
            - DATABASE_URL=postgresql://user:pass@db:5432/mydb
          depends_on:
            - db

        db:
          image: postgres:16
          environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: pass
            POSTGRES_DB: mydb
          volumes:
            - db-data:/var/lib/postgresql/data

      volumes:
        db-data:
      ```

      **به ساختار توجه کنید:** `services` → نام سرویس → پیکربندی. هر سرویس یک کانتینر است.
    examples:
      - q: "معنی 'build: ./api' در یک سرویس چیست؟"
        a: "کامپوز ایمیج را از Dockerfile در پوشه './api' می‌سازد، به جای استفاده از ایمیج آماده Docker Hub. عالی برای اپلیکیشن‌های سفارشی."
        labels: ["سینتکس YAML"]
        rel:
          - ["compose-build", "ساخت ایمیج محلی", "Dockerfile سفارشی"]
      - q: "depends_on چه کاری انجام می‌دهد؟"
        a: "ترتیب اجرا را تعریف می‌کند: سرویس فقط زمانی شروع می‌شود که سرویس‌های ذکرشده در حال اجرا باشند. توجه: منتظر نمی‌ماند تا سرویس‌ها آماده شوند — فقط تا شروع شوند."
        labels: ["سینتکس YAML"]
        rel:
          - ["depends-on", "ترتیب اجرا", "بدون بررسی آمادگی"]
      - q: "بخش 'volumes:' در انتهای فایل برای چیست؟"
        a: "Named Volume ها را اعلان می‌کند. اینجا 'db-data' به عنوان والیوم مدیریت‌شده ایجاد می‌شود. بدون این اعلان داکر خطا می‌دهد."
        labels: ["سینتکس YAML"]
        rel:
          - ["compose-volumes-block", "اعلان والیوم", "سطح بالا"]

  - title: "دستورات کامپوز"
    explanation: |
      مهم‌ترین دستورات داکر کامپوز:

      ```bash
      # اجرای همه سرویس‌ها
      docker compose up -d

      # وضعیت همه سرویس‌ها
      docker compose ps

      # لاگ همه سرویس‌ها
      docker compose logs -f

      # لاگ یک سرویس خاص
      docker compose logs -f api

      # توقف همه سرویس‌ها
      docker compose down

      # توقف و حذف والیوم‌ها
      docker compose down -v

      # بازسازی ایمیج‌ها و اجرا
      docker compose up -d --build
      ```

      **مهم:** `docker compose down -v` والیوم‌ها را هم حذف می‌کند — همه داده‌های پایگاه داده از بین می‌رود!
    examples:
      - q: "docker compose down"
        a: "همه کانتینرها، شبکه‌ها و والیوم‌های ناشناس را متوقف و حذف می‌کند. Named Volume ها باقی می‌مانند! معکوس 'docker compose up'."
        labels: ["دستورات"]
        rel:
          - ["compose-down", "توقف همه", "پاکسازی"]
      - q: "docker compose up -d --build"
        a: "همه ایمیج‌ها را دوباره می‌سازد (کش را نادیده می‌گیرد)، سپس همه سرویس‌ها را در پس‌زمینه اجرا می‌کند. مفید پس از تغییر کد."
        labels: ["دستورات"]
        rel:
          - ["compose-build-restart", "بازسازی + اجرا", "پس از تغییرات"]
      - q: "docker compose logs -f api"
        a: "لاگ‌های سرویس 'api' را به صورت مداوم نمایش می‌دهد. بدون نام سرویس، لاگ‌های ترکیبی همه سرویس‌ها نمایش داده می‌شود."
        labels: ["دستورات"]
        rel:
          - ["compose-logs", "لاگ سرویس", "اشکال‌زدایی"]

  - title: "مقیاس‌گذاری سرویس"
    explanation: |
      داکر کامپوز می‌تواند یک سرویس را **چندین بار اجرا** کند:

      ```bash
      # اجرای ۳ نمونه از سرویس api
      docker compose up -d --scale api=3
      ```

      یک محدودیت مهم وجود دارد: نمی‌توانید **پورت‌های ثابت میزبان** استفاده کنید، چون چندین کانتینر نمی‌توانند همان پورت را اشغال کنند.

      به جای آن از **بازه پورت** استفاده کنید یا بگذارید داکر پورت‌ها را تخصیص دهد:

      ```yaml
      services:
        api:
          build: ./api
          ports:
            - "3000-3002:3000"  # پورت‌های ۳۰۰۰، ۳۰۰۱، ۳۰۰۲
      ```

      در عمل یک **Reverse Proxy** (مانند Nginx یا Traefik) جلوی آن قرار می‌دهند تا درخواست‌ها را توزیع کند.
    examples:
      - q: "docker compose up -d --scale api=3"
        a: "۳ نمونه از سرویس api را اجرا می‌کند. داکر آن‌ها را api-1، api-2، api-3 نام‌گذاری می‌کند. مفید برای توزیع بار یا پردازش موازی."
        labels: ["مقیاس‌گذاری"]
        rel:
          - ["compose-scale", "نمونه‌های سرویس", "مقیاس‌گذاری افقی"]
      - q: "چرا هنگام مقیاس‌گذاری نمی‌توان از پورت‌های ثابت استفاده کرد؟"
        a: "چون هر پورت روی میزبان فقط یک بار قابل استفاده است. با ۳ نمونه نمی‌توان سه بار پورت ۳۰۰۰ را باز کرد — بنابراین بازه پورت یا تخصیص پویا لازم است."
        labels: ["مقیاس‌گذاری"]
        rel:
          - ["scale-port-conflict", "تداخل پورت", "بازه پورت"]
      - q: "Reverse Proxy جلوی سرویس‌های مقیاس‌شده چه کاری انجام می‌دهد؟"
        a: "درخواست‌های ورودی را بین نمونه‌های مختلف سرویس توزیع می‌کند (توزیع بار). Traefik حتی می‌تواند این کار را به صورت خودکار از طریق برچسب‌های داکر انجام دهد."
        labels: ["مقیاس‌گذاری"]
        rel:
          - ["reverse-proxy-lb", "توزیع بار", "Traefik/Nginx"]

  - title: "آزمون دانش"
    explanation: |
      دانش خود را درباره داکر کامپوز بسنجید!
    examples:
      - q: "فایل پیکربندی داکر کامپوز چه نامی دارد؟"
        type: input
        a:
          - "docker-compose.yaml"
          - "docker-compose.yml"
          - "compose.yaml"
          - "compose.yml"
      - q: "'docker compose down -v' چه کاری انجام می‌دهد؟"
        type: select
        options:
          - text: "همه چیز را متوقف و والیوم‌ها را هم حذف می‌کند"
            correct: true
          - text: "نسخه را نمایش می‌دهد"
          - text: "در حالت پرجزئیات اجرا می‌شود"
          - text: "فقط والیوم‌ها را متوقف می‌کند"
      - q: "کدام عبارات درباره داکر کامپوز صحیح هستند؟"
        type: multiple-choice
        options:
          - text: "کامپوز به صورت خودکار شبکه برای همه سرویس‌ها ایجاد می‌کند"
            correct: true
          - text: "سرویس‌ها از طریق نام سرویس خود به یکدیگر دسترسی دارند"
            correct: true
          - text: "depends_on منتظر آمادگی سرویس می‌ماند"
          - text: "--build بازسازی ایمیج‌ها را اجبار می‌کند"
            correct: true
      - q: "با 'docker compose down' (بدون -v) چه اتفاقی برای Named Volume ها می‌افتد؟"
        type: select
        options:
          - text: "باقی می‌مانند"
            correct: true
          - text: "حذف می‌شوند"
          - text: "فشرده می‌شوند"
          - text: "در Docker Hub ذخیره می‌شوند"
