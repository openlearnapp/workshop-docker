version: 2
number: 3
title: "درک ایمیج‌های داکر"
description: "ایمیج چیست، چگونه پیدا می‌شود و لایه‌ها چطور کار می‌کنند؟"
sections:
  - title: "ایمیج داکر چیست؟"
    explanation: |
      یک ایمیج داکر یک **بسته فقط‌خواندنی** است که هر آنچه یک اپلیکیشن برای اجرا نیاز دارد شامل می‌شود:

      - پایه سیستم‌عامل (مثلاً Alpine Linux، Ubuntu)
      - محیط اجرا (مثلاً Node.js، Python)
      - کد اپلیکیشن
      - وابستگی‌ها و کتابخانه‌ها
      - فایل‌های پیکربندی

      ایمیج‌ها مثل **قالب** هستند — از یک ایمیج می‌توانید هر تعداد کانتینر بسازید و هر کانتینر یکسان است.

      **نکته شگفت‌آور:** ایمیج Alpine Linux فقط **۵ مگابایت** حجم دارد! یک سیستم‌عامل کامل کوچک‌تر از یک عکس.
    examples:
      - q: "چرا ایمیج‌ها فقط‌خواندنی هستند؟"
        a: "تا هر کانتینری که از ایمیج اجرا می‌شود دقیقاً پایه یکسانی داشته باشد. تغییرات فقط در لایه نوشتنی کانتینر انجام می‌شود."
        labels: ["ایمیج‌ها"]
        rel:
          - ["image-readonly", "تضمین یکپارچگی", "تغییرناپذیری"]
      - q: "ایمیج Alpine Linux چقدر حجم دارد؟"
        a: "فقط حدود ۵ مگابایت — شامل یک سیستم لینوکس حداقلی است و اغلب به عنوان پایه ایمیج‌های سبک داکر استفاده می‌شود."
        labels: ["ایمیج‌ها"]
        rel:
          - ["alpine-size", "لینوکس حداقلی ۵ مگابایتی", "ایمیج پایه"]
      - q: "آیا یک ایمیج پس از ساخت قابل تغییر است؟"
        a: "خیر — ایمیج‌ها تغییرناپذیر (immutable) هستند. برای تغییر باید ایمیج جدیدی بسازید. کانتینرها یک لایه نوشتنی روی آن اضافه می‌کنند."
        labels: ["ایمیج‌ها"]
        rel:
          - ["image-immutable", "تغییرناپذیر", "لایه کانتینر"]

  - title: "جستجو و دانلود ایمیج‌ها"
    explanation: |
      **Docker Hub** رجیستری پیش‌فرض با بیش از ۱۰۰٬۰۰۰ ایمیج است:

      ```bash
      # جستجوی ایمیج
      docker search python

      # دانلود ایمیج
      docker pull python:3.12

      # نمایش همه ایمیج‌های محلی
      docker images
      ```

      **تگ‌ها** برچسب‌های نسخه هستند:
      - `python:3.12` — پایتون نسخه ۳.۱۲
      - `python:3.12-slim` — نسخه سبک بدون بسته‌های غیرضروری
      - `python:3.12-alpine` — بر پایه Alpine Linux (کوچک‌ترین)
      - `python:latest` — جدیدترین نسخه (⚠️ ممکن است تغییر کند!)

      **نکته:** **همیشه از تگ‌های مشخص** به جای `latest` استفاده کنید — وگرنه ممکن است در هر بار دانلود نسخه متفاوتی دریافت کنید!
    examples:
      - q: "docker pull python:3.12-slim"
        a: "ایمیج Python 3.12 در نسخه slim را دانلود می‌کند — شامل پایتون بدون بسته‌های غیرضروری. به‌مراتب کوچک‌تر از ایمیج استاندارد."
        labels: ["ایمیج‌ها"]
        rel:
          - ["docker-pull", "دانلود ایمیج", "انواع تگ"]
      - q: "docker images"
        a: "همه ایمیج‌های ذخیره‌شده محلی را با نام مخزن، تگ، شناسه ایمیج، تاریخ ساخت و حجم نمایش می‌دهد."
        labels: ["ایمیج‌ها"]
        rel:
          - ["docker-images-list", "ایمیج‌های محلی", "نمای کلی"]
      - q: "چرا نباید از تگ 'latest' استفاده کرد؟"
        a: "چون 'latest' در هر بار دانلود ممکن است تغییر کند. در محیط تولید بازتولیدپذیری مهم است — تگ‌های مشخص مانند '3.12' همیشه نسخه یکسانی را تضمین می‌کنند."
        labels: ["ایمیج‌ها"]
        rel:
          - ["latest-vermeiden", "بازتولیدپذیری", "بهترین شیوه"]

  - title: "درک لایه‌های ایمیج"
    explanation: |
      ایمیج‌های داکر از **لایه‌ها (Layers)** تشکیل شده‌اند. هر دستورالعمل در Dockerfile یک لایه ایجاد می‌کند:

      ```
      Layer 4: COPY app.py /app/          ← کد شما
      Layer 3: RUN pip install flask       ← وابستگی‌ها
      Layer 2: RUN apt-get update          ← بسته‌های سیستم
      Layer 1: FROM python:3.12-slim       ← ایمیج پایه
      ```

      **چرا لایه‌ها؟**
      - **کش کردن:** لایه‌های بدون تغییر مجدداً استفاده می‌شوند
      - **اشتراک‌گذاری:** ایمیج‌های مختلف می‌توانند لایه‌های پایه مشترک داشته باشند
      - **کارایی:** هنگام بازسازی فقط از لایه تغییریافته به بعد دوباره ساخته می‌شود

      اگر فقط `app.py` را تغییر دهید، داکر فقط لایه ۴ را دوباره می‌سازد — لایه‌های ۱ تا ۳ از کش می‌آیند!
    examples:
      - q: "docker history nginx"
        a: "همه لایه‌های ایمیج nginx را با حجم، زمان ساخت و دستوری که هر لایه را ایجاد کرده نمایش می‌دهد."
        labels: ["لایه‌ها"]
        rel:
          - ["docker-history", "نمای لایه‌ها", "بررسی ایمیج"]
      - q: "چرا ترتیب دستورالعمل‌ها در Dockerfile مهم است؟"
        a: "به دلیل کش لایه‌ها: دستورالعمل‌هایی که به ندرت تغییر می‌کنند (مثلاً apt-get install) باید بالا و دستورالعمل‌های پرتغییر (مثلاً COPY کد) پایین باشند — تا کش بهینه استفاده شود."
        labels: ["لایه‌ها"]
        rel:
          - ["layer-reihenfolge", "بهینه‌سازی کش", "عملکرد ساخت"]
      - q: "وقتی دو ایمیج پایه یکسانی دارند چه اتفاقی می‌افتد؟"
        a: "لایه‌های مشترک فقط یک بار روی دیسک ذخیره می‌شوند — داکر آن‌ها را به صورت خودکار به اشتراک می‌گذارد. این فضای زیادی صرفه‌جویی می‌کند."
        labels: ["لایه‌ها"]
        rel:
          - ["layer-sharing", "بهره‌وری فضا", "پایه مشترک"]

  - title: "پاکسازی ایمیج‌ها"
    explanation: |
      ایمیج‌ها به سرعت جمع می‌شوند. برای پاکسازی:

      ```bash
      # حذف یک ایمیج خاص
      docker rmi python:3.12

      # حذف همه ایمیج‌های استفاده‌نشده
      docker image prune

      # پاکسازی کامل (ایمیج‌ها، کانتینرها، شبکه‌ها)
      docker system prune

      # نمایش مصرف فضا
      docker system df
      ```

      **توجه:** `docker system prune` همه چیزی را که توسط کانتینر در حال اجرا استفاده نمی‌شود حذف می‌کند! با احتیاط استفاده کنید.
    examples:
      - q: "docker rmi python:3.12"
        a: "ایمیج python:3.12 را از سیستم شما حذف می‌کند. اگر هنوز کانتینری از آن وجود داشته باشد خطا می‌دهد — ابتدا کانتینر را حذف کنید."
        labels: ["پاکسازی"]
        rel:
          - ["docker-rmi", "حذف ایمیج", "آزادسازی فضا"]
      - q: "docker system df"
        a: "مصرف فضای داکر را نمایش می‌دهد: چقدر فضا ایمیج‌ها، کانتینرها، والیوم‌ها و کش ساخت اشغال کرده‌اند."
        labels: ["پاکسازی"]
        rel:
          - ["docker-system-df", "نمای فضا", "عیب‌یابی"]
      - q: "ایمیج‌های 'dangling' چیستند؟"
        a: "ایمیج‌هایی بدون تگ (نمایش‌داده‌شده به صورت <none>:<none>) — هنگام بازسازی ایمیج‌ها ایجاد می‌شوند زمانی که ایمیج قدیمی دیگر تگ ندارد. با 'docker image prune' قابل حذف هستند."
        labels: ["پاکسازی"]
        rel:
          - ["dangling-images", "ایمیج‌های بی‌سرپرست", "پاکسازی"]

  - title: "آزمون دانش"
    explanation: |
      دانش خود را درباره ایمیج‌های داکر بسنجید!
    examples:
      - q: "با چه دستوری یک ایمیج دانلود می‌کنید؟"
        type: input
        a:
          - "docker pull"
      - q: "مزیت لایه‌های ایمیج چیست؟"
        type: select
        options:
          - text: "کش کردن — فقط لایه‌های تغییریافته دوباره ساخته می‌شوند"
            correct: true
          - text: "لایه‌ها ایمیج‌ها را بزرگ‌تر می‌کنند"
          - text: "هر لایه یک کانتینر جداگانه است"
          - text: "لایه‌ها فقط روی Docker Hub وجود دارند"
      - q: "کدام عبارات درباره تگ‌های ایمیج صحیح هستند؟"
        type: multiple-choice
        options:
          - text: "'latest' در هر بار دانلود ممکن است تغییر کند"
            correct: true
          - text: "'slim' نسخه کوچک‌تر بدون بسته‌های غیرضروری است"
            correct: true
          - text: "تگ‌ها اختیاری و بی‌اهمیت هستند"
          - text: "'alpine' بر پایه یک سیستم لینوکس حداقلی است"
            correct: true
      - q: "docker system prune چه کاری انجام می‌دهد؟"
        type: select
        options:
          - text: "همه ایمیج‌ها، کانتینرها و شبکه‌های استفاده‌نشده را حذف می‌کند"
            correct: true
          - text: "فقط کانتینرهای متوقف‌شده را حذف می‌کند"
          - text: "همه کانتینرهای در حال اجرا را حذف می‌کند"
          - text: "داکر را به تنظیمات کارخانه بازنشانی می‌کند"
