lessons:
  - folder: "01-داکر-چیست"
    title: "داکر چیست؟"
    description: "آشنایی با فناوری کانتینر و دلیل انقلابی بودن داکر در توسعه نرم‌افزار."
  - folder: "02-نصب-و-شروع"
    title: "نصب و شروع کار"
    description: "نصب داکر و اجرای اولین کانتینر."
  - folder: "03-ایمیج-های-داکر"
    title: "درک ایمیج‌های داکر"
    description: "ایمیج چیست، چگونه پیدا می‌شود و لایه‌ها چطور کار می‌کنند؟"
  - folder: "04-نوشتن-داکرفایل"
    title: "ساخت ایمیج با Dockerfile"
    description: "ساخت و بهینه‌سازی ایمیج‌های داکر با Dockerfile."
  - folder: "05-مدیریت-کانتینر"
    title: "مدیریت کانتینرها"
    description: "اجرا، توقف، بررسی کانتینرها و خواندن لاگ‌ها."
  - folder: "06-والیوم-و-پایداری-داده"
    title: "والیوم و پایداری داده"
    description: "ذخیره پایدار داده‌ها در داکر با والیوم و Bind Mount."
  - folder: "07-شبکه-در-داکر"
    title: "شبکه در داکر"
    description: "اتصال کانتینرها به یکدیگر و درک مبانی شبکه."
  - folder: "08-مقدمات-داکر-کامپوز"
    title: "مقدمات داکر کامپوز"
    description: "آشنایی با داکر کامپوز و سینتکس docker-compose.yaml."
  - folder: "09-سرویس-های-کامپوز"
    title: "سرویس‌ها در داکر کامپوز"
    description: "تعریف، پیکربندی و کنترل سرویس‌ها با متغیرهای محیطی."
  - folder: "10-شبکه-و-والیوم-کامپوز"
    title: "کامپوز: شبکه و والیوم"
    description: "پیکربندی شبکه‌ها و والیوم‌ها در داکر کامپوز."
  - folder: "11-اپ-های-چند-کانتینری"
    title: "اپلیکیشن‌های چند کانتینری"
    description: "ساخت و مدیریت یک اپلیکیشن کامل با چندین سرویس."
  - folder: "12-بهترین-شیوه-ها"
    title: "بهترین شیوه‌ها و تولید"
    description: "بهینه‌سازی داکر و کامپوز برای استفاده در محیط تولید."
