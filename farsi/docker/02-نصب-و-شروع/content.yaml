version: 2
number: 2
title: "نصب و شروع کار"
description: "نصب داکر و اجرای اولین کانتینر."
sections:
  - title: "نصب داکر"
    explanation: |
      داکر برای همه سیستم‌عامل‌های رایج موجود است. ساده‌ترین راه **Docker Desktop** است:

      - **macOS:** Docker Desktop را از docker.com دانلود و نصب کنید
      - **Windows:** Docker Desktop را با WSL2 نصب کنید
      - **Linux:** Docker Engine را مستقیماً از طریق مدیر بسته نصب کنید

      پس از نصب با یک دستور ساده بررسی کنید که همه چیز درست کار می‌کند:

      ```bash
      docker --version
      ```

      اگر شماره نسخه نمایش داده شد، داکر آماده است!
    examples:
      - q: "docker --version"
        a: "نسخه نصب‌شده داکر را نمایش می‌دهد، مثلاً 'Docker version 24.0.7, build afdd53b'. با این دستور تأیید می‌کنید که داکر درست نصب شده."
        labels: ["نصب"]
        rel:
          - ["docker-version", "بررسی نسخه", "تأیید نصب"]
      - q: "docker info"
        a: "اطلاعات جزئی درباره نصب داکر نمایش می‌دهد: تعداد کانتینرها، ایمیج‌ها، محل ذخیره‌سازی، سیستم‌عامل، نسخه هسته و موارد بیشتر."
        labels: ["نصب"]
        rel:
          - ["docker-info", "جزئیات سیستم", "عیب‌یابی"]
      - q: "Docker Desktop در ویندوز از چه بک‌اندی استفاده می‌کند؟"
        a: "WSL2 (Windows Subsystem for Linux 2) — به این ترتیب کانتینرهای لینوکس بدون ماشین مجازی کامل به صورت بومی در ویندوز اجرا می‌شوند."
        labels: ["نصب"]
        rel:
          - ["wsl2-backend", "ادغام ویندوز", "سازگاری لینوکس"]

  - title: "اولین کانتینر: Hello World"
    explanation: |
      قدم سنتی اول — کانتینر **hello-world** را اجرا کنید:

      ```bash
      docker run hello-world
      ```

      چه اتفاقی می‌افتد؟
      1. داکر ایمیج `hello-world` را به صورت محلی جستجو می‌کند
      2. پیدا نمی‌کند → از Docker Hub دانلود می‌کند
      3. از ایمیج یک کانتینر ایجاد می‌کند
      4. کانتینر را اجرا می‌کند
      5. کانتینر پیامی نمایش می‌دهد و خاتمه می‌یابد

      همه این‌ها در **کمتر از ۲ ثانیه** اتفاق می‌افتد. تصور کنید برای این کار باید یک ماشین مجازی راه‌اندازی می‌کردید!
    examples:
      - q: "docker run hello-world"
        a: "ایمیج hello-world را دانلود می‌کند (بار اول)، یک کانتینر ایجاد، اجرا و پیام خوش‌آمدگویی نمایش می‌دهد."
        labels: ["شروع کار"]
        rel:
          - ["hello-world-run", "اولین کانتینر", "ورود به داکر"]
      - q: "پیام 'Unable to find image locally' به چه معناست؟"
        a: "ایمیج هنوز روی سیستم شما وجود ندارد. داکر آن را به صورت خودکار از Docker Hub دانلود می‌کند — این رفتار طبیعی در اولین اجرا است."
        labels: ["شروع کار"]
        rel:
          - ["image-pull-auto", "دانلود خودکار", "Docker Hub"]
      - q: "پس از اجرای hello-world چه اتفاقی برای کانتینر می‌افتد؟"
        a: "کانتینر بلافاصله پس از خروجی خاتمه می‌یابد. اما همچنان با وضعیت 'exited' وجود دارد و با 'docker ps -a' قابل مشاهده است."
        labels: ["شروع کار"]
        rel:
          - ["container-exit", "کانتینر خاتمه‌یافته", "چرخه حیات"]

  - title: "اجرای یک سرویس واقعی"
    explanation: |
      حالا هیجان‌انگیز می‌شود — یک **وب‌سرور Nginx** راه‌اندازی کنید:

      ```bash
      docker run -d -p 8080:80 --name mein-web nginx
      ```

      معنی فلگ‌ها:
      - `-d` — **حالت پس‌زمینه**: کانتینر در پس‌زمینه اجرا می‌شود
      - `-p 8080:80` — **نگاشت پورت**: پورت ۸۰۸۰ میزبان → پورت ۸۰ کانتینر
      - `--name mein-web` — نام‌گذاری کانتینر
      - `nginx` — ایمیج مورد استفاده

      حالا `http://localhost:8080` را در مرورگر باز کنید — صفحه خوش‌آمدگویی Nginx را می‌بینید! یک وب‌سرور با **یک دستور**.
    examples:
      - q: "docker run -d -p 8080:80 --name mein-web nginx"
        a: "یک کانتینر Nginx را در پس‌زمینه اجرا می‌کند، پورت ۸۰۸۰ (میزبان) را به پورت ۸۰ (کانتینر) نگاشت کرده و نام 'mein-web' به آن می‌دهد."
        labels: ["اجرای کانتینر"]
        rel:
          - ["nginx-run", "راه‌اندازی وب‌سرور", "نگاشت پورت"]
      - q: "معنی -p 8080:80 چیست؟"
        a: "نگاشت پورت: درخواست‌ها به پورت ۸۰۸۰ روی سیستم شما (میزبان) به پورت ۸۰ در کانتینر هدایت می‌شوند. فرمت: HOST:CONTAINER."
        labels: ["اجرای کانتینر"]
        rel:
          - ["port-mapping", "HOST:CONTAINER", "دسترسی شبکه"]
      - q: "بدون فلگ -d چه اتفاقی می‌افتد؟"
        a: "کانتینر در پیش‌زمینه اجرا شده و ترمینال شما را مسدود می‌کند. لاگ‌ها مستقیماً نمایش داده می‌شوند اما نمی‌توانید دستورات دیگری وارد کنید. با Ctrl+C کانتینر متوقف می‌شود."
        labels: ["اجرای کانتینر"]
        rel:
          - ["detached-vs-foreground", "پس‌زمینه در مقابل پیش‌زمینه", "حالت کانتینر"]

  - title: "توقف و پاکسازی کانتینر"
    explanation: |
      پس از آزمایش باید پاکسازی کنید:

      ```bash
      # توقف کانتینر
      docker stop mein-web

      # حذف کانتینر
      docker rm mein-web

      # یا هر دو در یک مرحله
      docker rm -f mein-web
      ```

      **مهم:** کانتینرهای متوقف‌شده همچنان فضا اشغال می‌کنند! پاکسازی منظم عادت خوبی است.

      ```bash
      # حذف همه کانتینرهای متوقف‌شده
      docker container prune
      ```
    examples:
      - q: "docker stop mein-web"
        a: "سیگنال SIGTERM به کانتینر 'mein-web' ارسال می‌کند و ۱۰ ثانیه برای خاموشی مرتب فرصت می‌دهد. سپس SIGKILL ارسال می‌شود."
        labels: ["مدیریت کانتینر"]
        rel:
          - ["docker-stop", "SIGTERM → SIGKILL", "خاموشی مرتب"]
      - q: "docker rm -f mein-web"
        a: "حذف اجباری کانتینر 'mein-web' — حتی اگر هنوز در حال اجرا باشد. ترکیب stop + rm در یک مرحله."
        labels: ["مدیریت کانتینر"]
        rel:
          - ["docker-rm-force", "حذف اجباری", "پاکسازی سریع"]
      - q: "docker container prune"
        a: "همه کانتینرهای متوقف‌شده را یکجا حذف می‌کند. قبل از حذف تأیید می‌خواهد. فضای ذخیره‌سازی را آزاد و لیست کانتینرها را مرتب نگه می‌دارد."
        labels: ["مدیریت کانتینر"]
        rel:
          - ["container-prune", "پاکسازی", "آزادسازی فضا"]

  - title: "آزمون دانش"
    explanation: |
      دانش خود را درباره نصب و شروع کار با داکر بسنجید!
    examples:
      - q: "با چه دستوری بررسی می‌کنید که داکر نصب شده است؟"
        type: input
        a:
          - "docker --version"
          - "docker version"
      - q: "فلگ -d در docker run چه معنایی دارد؟"
        type: select
        options:
          - text: "حالت پس‌زمینه — کانتینر در پس‌زمینه اجرا می‌شود"
            correct: true
          - text: "حالت اشکال‌زدایی — خطاها را نمایش می‌دهد"
          - text: "حالت حذف — پس از پایان حذف می‌کند"
          - text: "حالت دانلود — فقط ایمیج را دانلود می‌کند"
      - q: "کدام عبارات درباره نگاشت پورت صحیح هستند؟"
        type: multiple-choice
        options:
          - text: "فرمت آن HOST:CONTAINER است"
            correct: true
          - text: "-p 8080:80 پورت ۸۰۸۰ میزبان را به پورت ۸۰ کانتینر هدایت می‌کند"
            correct: true
          - text: "نگاشت پورت همیشه خودکار است"
          - text: "بدون -p کانتینر از بیرون قابل دسترسی نیست"
            correct: true
      - q: "docker container prune چه کاری انجام می‌دهد؟"
        type: select
        options:
          - text: "همه کانتینرهای متوقف‌شده را حذف می‌کند"
            correct: true
          - text: "همه کانتینرهای در حال اجرا را متوقف می‌کند"
          - text: "همه ایمیج‌ها را حذف می‌کند"
          - text: "همه کانتینرها را مجدداً راه‌اندازی می‌کند"
