version: 2
number: 6
title: "والیوم و پایداری داده"
description: "ذخیره پایدار داده‌ها در داکر با والیوم و Bind Mount."
sections:
  - title: "چرا والیوم؟"
    explanation: |
      کانتینرها **ناپایدار** (ephemeral) هستند — وقتی یک کانتینر حذف شود، **همه داده‌های داخلش از بین می‌رود**!

      تصور کنید یک پایگاه داده در کانتینر اجرا می‌کنید. به‌روزرسانی می‌کنید، کانتینر قدیمی را حذف و یک کانتینر جدید اجرا می‌کنید — **همه داده‌ها از دست می‌رود**.

      **والیوم‌ها** این مشکل را حل می‌کنند: داده‌ها را **خارج از کانتینر** روی سیستم میزبان ذخیره می‌کنند. حتی اگر کانتینر حذف شود، داده‌ها باقی می‌مانند.

      دو نوع اصلی وجود دارد:
      1. **Named Volumes** — مدیریت‌شده توسط داکر (توصیه‌شده)
      2. **Bind Mounts** — پیوند با یک پوشه میزبان
    examples:
      - q: "وقتی یک کانتینر حذف شود چه اتفاقی برای داده‌هایش می‌افتد؟"
        a: "برگشت‌ناپذیر از بین می‌روند! لایه نوشتنی کانتینر کاملاً حذف می‌شود. فقط داده‌های درون والیوم باقی می‌مانند."
        labels: ["والیوم‌ها"]
        rel:
          - ["container-ephemeral", "از دست رفتن داده هنگام حذف", "انگیزه استفاده از والیوم"]
      - q: "تفاوت بین Named Volume و Bind Mount چیست؟"
        a: "Named Volume توسط داکر مدیریت می‌شود (محل ذخیره را داکر تعیین می‌کند). Bind Mount یک مسیر مشخص میزبان را مستقیماً پیوند می‌دهد — شما محل را تعیین می‌کنید."
        labels: ["والیوم‌ها"]
        rel:
          - ["volume-vs-bind", "مدیریت داکر در مقابل مسیر میزبان", "انواع پایداری"]
      - q: "چرا Named Volume روش توصیه‌شده است؟"
        a: "قابل حمل هستند (روی هر سیستم‌عاملی یکسان کار می‌کنند)، توسط داکر مدیریت می‌شوند، به‌راحتی پشتیبان‌گیری شده و عملکرد بهتری در macOS/Windows دارند."
        labels: ["والیوم‌ها"]
        rel:
          - ["named-volume-vorteil", "قابل حمل + عملکرد بالا", "بهترین شیوه"]

  - title: "Named Volumes"
    explanation: |
      Named Volume **روش توصیه‌شده** برای پایداری داده است:

      ```bash
      # ایجاد والیوم
      docker volume create meine-daten

      # اجرای کانتینر با والیوم
      docker run -d --name db -v meine-daten:/var/lib/postgresql/data postgres:16

      # لیست والیوم‌ها
      docker volume ls

      # بررسی والیوم
      docker volume inspect meine-daten
      ```

      مسیر پس از دونقطه (`:/var/lib/postgresql/data`) **نقطه اتصال در کانتینر** است — والیوم آنجا متصل می‌شود.

      **آزمایش کنید:** کانتینر را حذف و یک کانتینر جدید با همان والیوم بسازید — داده‌ها هنوز هستند!
    examples:
      - q: "docker run -d -v meine-daten:/var/lib/postgresql/data postgres:16"
        a: "یک کانتینر PostgreSQL اجرا کرده و Named Volume 'meine-daten' را به دایرکتوری داده متصل می‌کند. داده‌های پایگاه داده از راه‌اندازی مجدد کانتینر جان سالم به در می‌برند."
        labels: ["Named Volumes"]
        rel:
          - ["volume-mount-postgres", "پایداری پایگاه داده", "Named Volume"]
      - q: "docker volume inspect meine-daten"
        a: "جزئیات والیوم را نمایش می‌دهد: تاریخ ایجاد، درایور، نقطه اتصال روی سیستم میزبان و برچسب‌ها."
        labels: ["Named Volumes"]
        rel:
          - ["volume-inspect", "جزئیات والیوم", "عیب‌یابی"]
      - q: "اگر والیوم هنگام docker run وجود نداشته باشد چه می‌شود؟"
        a: "داکر آن را به صورت خودکار ایجاد می‌کند! 'docker volume create' صریح اختیاری است اما برای نمای بهتر توصیه می‌شود."
        labels: ["Named Volumes"]
        rel:
          - ["volume-auto-create", "ایجاد خودکار", "راحتی"]

  - title: "Bind Mounts"
    explanation: |
      Bind Mount یک **پوشه مشخص میزبان** را با یک پوشه کانتینر پیوند می‌دهد:

      ```bash
      # پوشه فعلی به عنوان Bind Mount
      docker run -d -v $(pwd)/html:/usr/share/nginx/html nginx

      # Bind Mount فقط‌خواندنی
      docker run -d -v $(pwd)/config:/app/config:ro nginx
      ```

      **عالی برای توسعه:** فایل‌ها را روی میزبان تغییر دهید → تغییرات فوراً در کانتینر قابل مشاهده هستند (و بالعکس).

      **توجه:** Bind Mount خطراتی دارد:
      - کانتینر می‌تواند فایل‌های میزبان را بازنویسی کند
      - مشکلات عملکرد در macOS/Windows
      - قابل حمل نیست (مسیرها وابسته به سیستم‌عامل هستند)
    examples:
      - q: "docker run -v $(pwd):/app -w /app node:20 npm start"
        a: "دایرکتوری فعلی را به /app در کانتینر متصل، آن را به عنوان دایرکتوری کاری تنظیم و npm را اجرا می‌کند. عالی برای توسعه محلی — تغییرات کد فوراً اعمال می‌شوند."
        labels: ["Bind Mounts"]
        rel:
          - ["bind-mount-dev", "بارگذاری مجدد زنده", "محیط توسعه"]
      - q: "معنی :ro در انتهای یک Volume Mount چیست؟"
        a: "فقط‌خواندنی — کانتینر فقط می‌تواند فایل‌ها را بخواند، نه تغییر دهد. مفید برای فایل‌های پیکربندی که نباید تغییر کنند."
        labels: ["Bind Mounts"]
        rel:
          - ["mount-readonly", "محافظت نوشتن", "امنیت"]
      - q: "چرا Bind Mount در macOS کندتر از Linux است؟"
        a: "چون داکر در macOS در یک ماشین مجازی لینوکس اجرا می‌شود. فایل‌ها باید بین سیستم فایل macOS و ماشین مجازی همگام‌سازی شوند — این هزینه عملکردی دارد."
        labels: ["Bind Mounts"]
        rel:
          - ["bind-mount-macos", "سربار ماشین مجازی", "محدودیت عملکرد"]

  - title: "پاکسازی والیوم‌ها"
    explanation: |
      والیوم‌ها حتی وقتی هیچ کانتینری از آن‌ها استفاده نمی‌کند باقی می‌مانند:

      ```bash
      # حذف یک والیوم خاص
      docker volume rm meine-daten

      # حذف همه والیوم‌های استفاده‌نشده
      docker volume prune

      # نمایش مصرف فضای والیوم‌ها
      docker system df
      ```

      **احتیاط:** `docker volume prune` همه والیوم‌هایی را که توسط هیچ کانتینری استفاده نمی‌شوند حذف می‌کند — قبلاً با `docker volume ls` بررسی کنید چه چیزی حذف می‌شود!

      **نکته برای پشتیبان‌گیری:**
      ```bash
      docker run --rm -v meine-daten:/data -v $(pwd):/backup alpine tar czf /backup/backup.tar.gz /data
      ```
    examples:
      - q: "docker volume prune"
        a: "همه والیوم‌هایی را که توسط هیچ کانتینری (حتی متوقف‌شده!) استفاده نمی‌شوند حذف می‌کند. قبل از حذف تأیید می‌خواهد."
        labels: ["پاکسازی"]
        rel:
          - ["volume-prune", "حذف والیوم‌های استفاده‌نشده", "آزادسازی فضا"]
      - q: "چگونه از یک والیوم پشتیبان بگیریم؟"
        a: "یک کانتینر موقت اجرا کنید که والیوم و یک پوشه میزبان را متصل کرده، سپس داده‌ها را با tar فشرده کنید: docker run --rm -v daten:/data -v $(pwd):/backup alpine tar czf /backup/backup.tar.gz /data"
        labels: ["پاکسازی"]
        rel:
          - ["volume-backup", "tar + کانتینر موقت", "پشتیبان‌گیری داده"]
      - q: "آیا می‌توان یک والیوم حذف‌شده را بازیابی کرد؟"
        a: "خیر — وقتی والیوم حذف شود، داده‌ها برگشت‌ناپذیر از بین می‌روند. به همین دلیل پشتیبان‌گیری منظم مهم است!"
        labels: ["پاکسازی"]
        rel:
          - ["volume-delete-permanent", "بدون بازگشت", "اهمیت پشتیبان‌گیری"]

  - title: "آزمون دانش"
    explanation: |
      دانش خود را درباره والیوم‌ها بسنجید!
    examples:
      - q: "با چه فلگی هنگام docker run یک والیوم متصل می‌کنید؟"
        type: input
        a:
          - "-v"
          - "--volume"
      - q: "کدام نوع والیوم برای تولید توصیه می‌شود؟"
        type: select
        options:
          - text: "Named Volumes"
            correct: true
          - text: "Bind Mounts"
          - text: "tmpfs Mounts"
          - text: "بدون والیوم — داده‌ها در کانتینر ذخیره شوند"
      - q: "کدام عبارات درباره Bind Mount صحیح هستند؟"
        type: multiple-choice
        options:
          - text: "عالی برای توسعه محلی"
            correct: true
          - text: "کانتینر می‌تواند فایل‌های میزبان را بازنویسی کند"
            correct: true
          - text: "عملکرد روی همه سیستم‌عامل‌ها یکسان است"
          - text: ":ro اتصال را فقط‌خواندنی می‌کند"
            correct: true
      - q: "وقتی کانتینر حذف شود چه اتفاقی برای داده‌های والیوم می‌افتد؟"
        type: select
        options:
          - text: "داده‌ها باقی می‌مانند"
            correct: true
          - text: "داده‌ها حذف می‌شوند"
          - text: "داده‌ها فشرده می‌شوند"
          - text: "داده‌ها به Docker Hub آپلود می‌شوند"
