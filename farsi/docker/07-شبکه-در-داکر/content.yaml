version: 2
number: 7
title: "شبکه در داکر"
description: "اتصال کانتینرها به یکدیگر و درک مبانی شبکه."
sections:
  - title: "مبانی شبکه"
    explanation: |
      داکر یک **شبکه مجازی** مخصوص برای کانتینرها ایجاد می‌کند. به صورت پیش‌فرض سه شبکه وجود دارد:

      ```bash
      docker network ls
      ```

      | شبکه | نوع | توضیح |
      |---|---|---|
      | `bridge` | Bridge | پیش‌فرض برای کانتینرها (ایزوله) |
      | `host` | Host | کانتینر مستقیماً از شبکه میزبان استفاده می‌کند |
      | `none` | None | بدون شبکه — کاملاً ایزوله |

      در شبکه **bridge** هر کانتینر به اینترنت دسترسی دارد، اما کانتینرها **نمی‌توانند از طریق نام** یکدیگر را پیدا کنند — برای این کار به یک شبکه سفارشی نیاز دارید.
    examples:
      - q: "docker network ls"
        a: "همه شبکه‌های داکر را لیست می‌کند: bridge، host و none همیشه موجودند، به همراه شبکه‌های ایجادشده توسط کاربر."
        labels: ["شبکه"]
        rel:
          - ["network-ls", "نمای شبکه‌ها", "شبکه‌های پیش‌فرض"]
      - q: "شبکه bridge چیست؟"
        a: "شبکه پیش‌فرض برای کانتینرها. کانتینرها در آن به اینترنت دسترسی دارند اما نمی‌توانند از طریق نام به یکدیگر دسترسی پیدا کنند — فقط از طریق آدرس IP."
        labels: ["شبکه"]
        rel:
          - ["bridge-network", "شبکه پیش‌فرض", "ایزوله"]
      - q: "چه زمانی از شبکه host استفاده می‌شود؟"
        a: "وقتی حداکثر عملکرد شبکه لازم باشد — کانتینر پشته شبکه را با میزبان به اشتراک می‌گذارد. نگاشت پورت لازم نیست اما ایزولاسیون شبکه هم وجود ندارد."
        labels: ["شبکه"]
        rel:
          - ["host-network", "حداکثر عملکرد", "بدون ایزولاسیون"]

  - title: "ایجاد شبکه‌های سفارشی"
    explanation: |
      شبکه‌های سفارشی کلید **ارتباط بین کانتینرها** هستند:

      ```bash
      # ایجاد شبکه
      docker network create mein-netz

      # اجرای کانتینر در شبکه
      docker run -d --name web --network mein-netz nginx
      docker run -d --name db --network mein-netz postgres:16
      ```

      **مزیت بزرگ:** در یک شبکه سفارشی کانتینرها می‌توانند **از طریق نامشان به یکدیگر دسترسی پیدا کنند**! کانتینر `web` می‌تواند `db` را به عنوان نام میزبان استفاده کند:

      ```
      postgresql://user:pass@db:5432/mydb
      ```

      داکر یک **سرور DNS داخلی** دارد که نام کانتینرها را به آدرس IP تبدیل می‌کند.
    examples:
      - q: "docker network create mein-netz"
        a: "یک شبکه Bridge سفارشی جدید ایجاد می‌کند. کانتینرها در آن می‌توانند از طریق نامشان یکدیگر را پیدا کنند — به لطف DNS داخلی داکر."
        labels: ["شبکه"]
        rel:
          - ["network-create", "شبکه سفارشی", "تفکیک‌پذیری DNS"]
      - q: "چرا نام کانتینر به عنوان نام میزبان فقط در شبکه‌های سفارشی کار می‌کند؟"
        a: "شبکه bridge پیش‌فرض به دلایل قدیمی سرویس DNS ندارد. شبکه‌های سفارشی DNS داخلی داکر را به صورت خودکار فعال می‌کنند."
        labels: ["شبکه"]
        rel:
          - ["custom-network-dns", "DNS فقط در شبکه‌های سفارشی", "bridge قدیمی"]
      - q: "docker network connect mein-netz bestehender-container"
        a: "یک کانتینر در حال اجرا را به شبکه متصل می‌کند — بدون نیاز به راه‌اندازی مجدد. یک کانتینر می‌تواند همزمان در چندین شبکه باشد."
        labels: ["شبکه"]
        rel:
          - ["network-connect", "اتصال بعدی", "چند شبکه"]

  - title: "ارتباط بین کانتینرها"
    explanation: |
      یک مثال عملی — **وب‌اپلیکیشن + پایگاه داده**:

      ```bash
      # ایجاد شبکه
      docker network create app-netz

      # اجرای PostgreSQL
      docker run -d --name postgres \
        --network app-netz \
        -e POSTGRES_PASSWORD=geheim \
        postgres:16

      # اجرای اپلیکیشن که به postgres دسترسی دارد
      docker run -d --name app \
        --network app-netz \
        -e DATABASE_URL=postgresql://postgres:geheim@postgres:5432/postgres \
        -p 3000:3000 \
        meine-app
      ```

      توجه کنید: `@postgres:5432` — نام میزبان همان **نام کانتینر** است! برای ارتباط داخلی نیازی به Port Publishing نیست.
    examples:
      - q: "آیا برای ارتباط بین کانتینرها در یک شبکه به -p نیاز است؟"
        a: "خیر! -p (نگاشت پورت) فقط برای دسترسی از بیرون (میزبان → کانتینر) لازم است. کانتینرها در یک شبکه مستقیماً از طریق همه پورت‌ها به هم دسترسی دارند."
        labels: ["ارتباط"]
        rel:
          - ["internal-ports", "بدون نگاشت پورت داخلی", "کانتینر به کانتینر"]
      - q: "وقتی دو کانتینر در شبکه‌های مختلف هستند چه اتفاقی می‌افتد؟"
        a: "نمی‌توانند با هم ارتباط برقرار کنند — شبکه‌ها ایزوله هستند. باید یک کانتینر را به هر دو شبکه متصل کنید یا آن‌ها را در یک شبکه قرار دهید."
        labels: ["ارتباط"]
        rel:
          - ["network-isolation", "جداسازی شبکه", "امنیت"]
      - q: "چرا از نام کانتینر به جای آدرس IP استفاده می‌شود؟"
        a: "آدرس IP کانتینرها ممکن است تغییر کند (مثلاً هنگام راه‌اندازی مجدد). نام ثابت می‌ماند و توسط DNS داکر به صورت خودکار به IP فعلی تبدیل می‌شود."
        labels: ["ارتباط"]
        rel:
          - ["dns-vs-ip", "نام‌های پایدار", "تفکیک‌پذیری DNS"]

  - title: "بررسی و پاکسازی شبکه‌ها"
    explanation: |
      اشکال‌زدایی و پاکسازی شبکه‌ها:

      ```bash
      # نمایش جزئیات شبکه (شامل کانتینرهای متصل)
      docker network inspect mein-netz

      # قطع اتصال کانتینر از شبکه
      docker network disconnect mein-netz web

      # حذف شبکه (فقط اگر هیچ کانتینری متصل نباشد)
      docker network rm mein-netz

      # حذف همه شبکه‌های استفاده‌نشده
      docker network prune
      ```

      **نکته:** `docker network inspect` **آدرس IP همه کانتینرها** در شبکه را نشان می‌دهد — عالی برای اشکال‌زدایی مشکلات اتصال.
    examples:
      - q: "docker network inspect mein-netz"
        a: "همه جزئیات را نمایش می‌دهد: زیرشبکه، دروازه، کانتینرهای متصل با آدرس IP و پیکربندی شبکه."
        labels: ["عیب‌یابی"]
        rel:
          - ["network-inspect", "مشاهده IP کانتینرها", "عیب‌یابی شبکه"]
      - q: "docker network prune"
        a: "همه شبکه‌هایی که توسط هیچ کانتینری استفاده نمی‌شوند را حذف می‌کند. شبکه‌های پیش‌فرض (bridge، host، none) همیشه باقی می‌مانند."
        labels: ["عیب‌یابی"]
        rel:
          - ["network-prune", "شبکه‌های استفاده‌نشده", "پاکسازی"]
      - q: "چگونه اتصال بین دو کانتینر را تست کنیم؟"
        a: "با 'docker exec web ping db' یا 'docker exec web curl http://db:80'. اگر کانتینر ping نداشت، از یک کانتینر اشکال‌زدایی استفاده کنید: docker run --rm --network mein-netz alpine ping db"
        labels: ["عیب‌یابی"]
        rel:
          - ["network-debug", "تست اتصال", "ping/curl"]

  - title: "آزمون دانش"
    explanation: |
      دانش خود را درباره شبکه‌های داکر بسنجید!
    examples:
      - q: "با چه دستوری یک شبکه جدید داکر ایجاد می‌کنید؟"
        type: input
        a:
          - "docker network create"
      - q: "چرا به جای شبکه bridge پیش‌فرض یک شبکه سفارشی ایجاد می‌کنیم؟"
        type: select
        options:
          - text: "چون شبکه‌های سفارشی تفکیک‌پذیری DNS از طریق نام کانتینر ارائه می‌دهند"
            correct: true
          - text: "چون شبکه bridge پیش‌فرض کندتر است"
          - text: "چون کانتینرها در bridge پیش‌فرض اینترنت ندارند"
          - text: "چون bridge پیش‌فرض به صورت خودکار حذف می‌شود"
      - q: "کدام عبارات درباره شبکه‌های داکر صحیح هستند؟"
        type: multiple-choice
        options:
          - text: "کانتینرها در یک شبکه نیازی به نگاشت پورت ندارند"
            correct: true
          - text: "نام کانتینرها به عنوان نام میزبان در شبکه سفارشی عمل می‌کنند"
            correct: true
          - text: "داکر یک سرور DNS داخلی دارد"
            correct: true
          - text: "کانتینرها در شبکه‌های مختلف آزادانه ارتباط برقرار می‌کنند"
      - q: "URL اتصال به یک کانتینر PostgreSQL به نام 'db' چگونه است؟"
        type: input
        a:
          - "postgresql://user:pass@db:5432"
          - "postgres://user:pass@db:5432"
          - "db:5432"
