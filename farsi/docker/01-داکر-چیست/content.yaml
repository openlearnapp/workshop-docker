version: 2
number: 1
title: "داکر چیست؟"
description: "آشنایی با فناوری کانتینر و دلیل انقلابی بودن داکر در توسعه نرم‌افزار."
sections:
  - title: "مشکل بدون کانتینر"
    explanation: |
      تصور کن یک اپلیکیشن روی لپ‌تاپت توسعه می‌دهی. همه چیز عالی کار می‌کند. بعد آن را به یک همکار می‌دهی — و **هیچ چیز کار نمی‌کند**. نسخه متفاوت پایتون، کتابخانه‌های ناموجود، سیستم‌عامل متفاوت.

      این مشکل **"Works on my machine"** (روی سیستم من کار می‌کنه) نام دارد و یکی از رایج‌ترین مشکلات در توسعه نرم‌افزار است.

      **داکر دقیقاً این مشکل را حل می‌کند.** اپلیکیشن تو را همراه با هر آنچه نیاز دارد در یک **کانتینر** بسته‌بندی می‌کند — نوعی محیط قابل حمل و ایزوله.
    examples:
      - q: "مشکل 'Works on my machine' چیست؟"
        a: "اپلیکیشن روی سیستم توسعه‌دهنده کار می‌کند، اما روی سیستم‌های دیگر به دلیل وابستگی‌ها یا تنظیمات متفاوت کار نمی‌کند."
        labels: ["مبانی"]
        rel:
          - ["works-on-my-machine", "مشکل کلاسیک استقرار", "انگیزه استفاده از کانتینر"]
      - q: "داکر چه چیزی را در یک کانتینر بسته‌بندی می‌کند؟"
        a: "اپلیکیشن به همراه تمام وابستگی‌ها (کتابخانه‌ها، محیط اجرا، تنظیمات) — هر آنچه برای اجرا لازم است."
        labels: ["مبانی"]
        rel:
          - ["container-inhalt", "اپلیکیشن + وابستگی‌ها", "کانتینر داکر"]
      - q: "چرا جمله 'روی سیستم من کار می‌کنه' در تیم مفید نیست؟"
        a: "چون محیط روی هر سیستمی متفاوت است — داکر تضمین می‌کند که محیط همه جا یکسان باشد."
        labels: ["مبانی"]
        rel:
          - ["umgebung-konsistenz", "محیط‌های یکسان", "مزیت داکر"]

  - title: "کانتینر در مقابل ماشین مجازی"
    explanation: |
      شاید فکر کنی: *«مگر ماشین مجازی همین کار را نمی‌کند؟»* — بله، ولی کانتینرها **بسیار سبک‌تر** هستند.

      | ویژگی | ماشین مجازی | کانتینر |
      |---|---|---|
      | زمان راه‌اندازی | دقیقه‌ها | ثانیه‌ها |
      | حجم | گیگابایت | مگابایت |
      | سیستم‌عامل | سیستم‌عامل مهمان جداگانه | اشتراک هسته میزبان |
      | ایزولاسیون | کامل | سطح فرآیند |
      | منابع | سنگین | سبک |

      یک ماشین مجازی یک دستگاه کامل با سیستم‌عامل جداگانه شبیه‌سازی می‌کند. یک کانتینر **هسته میزبان را به اشتراک می‌گذارد** و فقط اپلیکیشن را ایزوله می‌کند. به همین دلیل کانتینرها در ثانیه‌ها راه‌اندازی می‌شوند.
    examples:
      - q: "چرا کانتینرها سریع‌تر از ماشین‌های مجازی راه‌اندازی می‌شوند؟"
        a: "کانتینرها هسته سیستم‌عامل میزبان را به اشتراک می‌گذارند و نیازی به بوت کردن سیستم‌عامل جداگانه ندارند — فقط اپلیکیشن اجرا می‌شود."
        labels: ["مبانی"]
        rel:
          - ["container-vs-vm-start", "اشتراک هسته", "مزیت عملکرد"]
      - q: "یک کانتینر معمولی در مقایسه با ماشین مجازی چقدر حافظه مصرف می‌کند؟"
        a: "کانتینرها معمولاً فقط مگابایت نیاز دارند، در حالی که ماشین‌های مجازی اغلب چندین گیگابایت مصرف می‌کنند چون یک سیستم‌عامل مهمان کامل دارند."
        labels: ["مبانی"]
        rel:
          - ["container-groesse", "مگابایت در مقابل گیگابایت", "مصرف منابع"]
      - q: "آیا روی یک سرور تعداد بیشتری کانتینر جا می‌شود یا ماشین مجازی؟"
        a: "تعداد بسیار بیشتری کانتینر — چون منابع کمتری مصرف می‌کنند و هسته را به اشتراک می‌گذارند، صدها کانتینر روی سروری جا می‌شود که فقط چند ماشین مجازی را تحمل می‌کند."
        labels: ["مبانی"]
        rel:
          - ["container-dichte", "صدها در مقابل چند تا", "ظرفیت سرور"]

  - title: "معماری داکر"
    explanation: |
      داکر از سه جزء اصلی تشکیل شده:

      1. **Docker Daemon (dockerd)** — سرویس پس‌زمینه که کانتینرها را ایجاد و مدیریت می‌کند
      2. **Docker CLI** — ابزار خط فرمان که با آن دستور می‌دهی
      3. **Docker Registry** — محل ذخیره‌سازی ایمیج‌ها (مثلاً Docker Hub)

      روند کار ساده است:
      - یک دستور وارد می‌کنی (مثلاً `docker run nginx`)
      - CLI دستور را به Daemon ارسال می‌کند
      - Daemon ایمیج را (در صورت نیاز) از Registry دانلود می‌کند
      - Daemon کانتینر را ایجاد و اجرا می‌کند

      **نکته جالب:** نام داکر از کارگران بندر گرفته شده که کانتینرها را روی کشتی بار می‌زنند — دقیقاً همین کار را داکر با نرم‌افزار انجام می‌دهد!
    examples:
      - q: "docker run nginx"
        a: "ایمیج nginx را از Docker Hub دانلود می‌کند (اگر موجود نباشد) و یک کانتینر با آن اجرا می‌کند."
        labels: ["معماری"]
        rel:
          - ["docker-run-flow", "دانلود ایمیج → اجرای کانتینر", "روند کار داکر"]
      - q: "Docker Daemon چه کاری انجام می‌دهد؟"
        a: "سرویس پس‌زمینه (dockerd) است که ایمیج‌ها را مدیریت و کانتینرها را ایجاد، اجرا و نظارت می‌کند."
        labels: ["معماری"]
        rel:
          - ["docker-daemon", "سرویس پس‌زمینه", "جزء اصلی"]
      - q: "Docker Hub چیست؟"
        a: "رجیستری پیش‌فرض داکر — یک مخزن عمومی با هزاران ایمیج آماده مانند nginx، postgres، node، python و غیره."
        labels: ["معماری"]
        rel:
          - ["docker-hub", "رجیستری عمومی", "منبع ایمیج"]

  - title: "اصطلاحات مهم داکر"
    explanation: |
      قبل از شروع، اصطلاحات مهم را بشناسیم:

      - **Image (ایمیج):** یک قالب فقط‌خواندنی با هر آنچه یک اپلیکیشن نیاز دارد. مثل یک دستور آشپزی.
      - **Container (کانتینر):** یک نمونه در حال اجرا از یک ایمیج. مثل غذای آماده‌شده از روی دستور.
      - **Dockerfile:** یک فایل متنی با دستورالعمل‌ها برای ساخت ایمیج. مثل کتاب آشپزی.
      - **Registry (رجیستری):** محل ذخیره‌سازی ایمیج‌ها (مثلاً Docker Hub).
      - **Volume (والیوم):** حافظه پایدار برای داده‌های کانتینر.
      - **Layer (لایه):** ایمیج‌ها از لایه‌ها تشکیل شده‌اند — هر دستورالعمل در Dockerfile یک لایه جدید ایجاد می‌کند.

      به خاطر بسپار: **ایمیج = نقشه ساختمان، کانتینر = ساختمان**. از یک ایمیج می‌توانی هر تعداد کانتینر بسازی.
    examples:
      - q: "تفاوت بین ایمیج و کانتینر چیست؟"
        a: "ایمیج یک قالب فقط‌خواندنی (نقشه ساختمان) و کانتینر یک نمونه در حال اجرا از آن (ساختمان) است. از یک ایمیج می‌توان کانتینرهای متعددی ساخت."
        labels: ["اصطلاحات"]
        rel:
          - ["image-vs-container", "نقشه در مقابل ساختمان", "مفهوم اصلی"]
      - q: "Dockerfile چیست؟"
        a: "یک فایل متنی با دستورالعمل‌های گام‌به‌گام که نحوه ساخت یک ایمیج داکر را توصیف می‌کند."
        labels: ["اصطلاحات"]
        rel:
          - ["dockerfile-def", "دستورالعمل ساخت", "ایجاد ایمیج"]
      - q: "چرا ایمیج‌ها از لایه‌ها تشکیل شده‌اند؟"
        a: "هر دستورالعمل در Dockerfile یک لایه ایجاد می‌کند. به لطف کش کردن، هنگام تغییر فقط لایه‌های تغییریافته دوباره ساخته می‌شوند — این باعث صرفه‌جویی در زمان و فضا می‌شود."
        labels: ["اصطلاحات"]
        rel:
          - ["image-layers", "مزیت کش", "بهینه‌سازی ساخت"]

  - title: "آزمون دانش"
    explanation: |
      دانش خود را درباره مبانی داکر بسنجید!
    examples:
      - q: "مشکلی که اپلیکیشن روی سیستم توسعه‌دهنده کار می‌کند ولی روی سیستم‌های دیگر نه، چه نام دارد؟"
        type: input
        a:
          - "Works on my machine"
          - "works on my machine"
      - q: "کانتینرها چه چیزی را با سیستم میزبان به اشتراک می‌گذارند؟"
        type: select
        options:
          - text: "هسته (Kernel)"
            correct: true
          - text: "سیستم‌عامل کامل"
          - text: "هارد دیسک"
          - text: "حافظه RAM"
      - q: "کدام عبارات درباره داکر صحیح هستند؟"
        type: multiple-choice
        options:
          - text: "کانتینرها در ثانیه‌ها راه‌اندازی می‌شوند"
            correct: true
          - text: "ایمیج یک نمونه در حال اجرا است"
          - text: "Docker Hub یک رجیستری عمومی است"
            correct: true
          - text: "کانتینرها به سیستم‌عامل جداگانه نیاز دارند"
      - q: "رابطه بین ایمیج و کانتینر چیست؟"
        type: select
        options:
          - text: "ایمیج = نقشه، کانتینر = نمونه در حال اجرا"
            correct: true
          - text: "کانتینر = نقشه، ایمیج = نمونه در حال اجرا"
          - text: "هر دو یکی هستند"
          - text: "ایمیج‌ها فقط روی Docker Hub وجود دارند"
