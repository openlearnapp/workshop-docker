lessons:
  - folder: "01-was-ist-docker"
    title: "Was ist Docker?"
    description: "Einführung in Container-Technologie und warum Docker die Softwareentwicklung revolutioniert hat."
  - folder: "02-installation-und-erste-schritte"
    title: "Installation & erste Schritte"
    description: "Docker installieren und den ersten Container starten."
  - folder: "03-docker-images"
    title: "Docker Images verstehen"
    description: "Was sind Images, wie findet man sie und wie funktionieren Layers?"
  - folder: "04-dockerfile-erstellen"
    title: "Eigene Images mit Dockerfile"
    description: "Eigene Docker-Images mit einem Dockerfile erstellen und optimieren."
  - folder: "05-container-verwalten"
    title: "Container verwalten"
    description: "Container starten, stoppen, inspizieren und Logs auswerten."
  - folder: "06-volumes-und-datenpersistenz"
    title: "Volumes & Datenpersistenz"
    description: "Daten in Docker persistent speichern mit Volumes und Bind Mounts."
  - folder: "07-docker-netzwerke"
    title: "Docker Netzwerke"
    description: "Container miteinander verbinden und Netzwerk-Grundlagen verstehen."
  - folder: "08-docker-compose-grundlagen"
    title: "Docker Compose Grundlagen"
    description: "Einführung in Docker Compose und die docker-compose.yaml Syntax."
  - folder: "09-compose-services"
    title: "Services in Docker Compose"
    description: "Services definieren, konfigurieren und mit Environment-Variablen steuern."
  - folder: "10-compose-netzwerke-und-volumes"
    title: "Compose: Netzwerke & Volumes"
    description: "Netzwerke und Volumes in Docker Compose konfigurieren."
  - folder: "11-multi-container-apps"
    title: "Multi-Container-Anwendungen"
    description: "Eine vollständige App mit mehreren Services aufbauen und orchestrieren."
  - folder: "12-best-practices"
    title: "Best Practices & Produktion"
    description: "Docker und Compose für den produktiven Einsatz optimieren."
