  <!-- Titel -->
  <text x="640" y="450" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">Docker &amp; Docker Compose</text>
  <text x="640" y="510" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#b3d9ff" text-anchor="middle">Container-Technologie meistern</text>
