      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)" rx="20"/>
  <!-- Container-Symbol -->
  <g transform="translate(540, 180)">
