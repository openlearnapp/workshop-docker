    <rect x="135" y="55" width="30" height="25" rx="3" fill="#00acc1" opacity="0.9"/>
    <rect x="47" y="25" width="30" height="25" rx="3" fill="#80deea" opacity="0.9"/>
    <rect x="82" y="25" width="30" height="25" rx="3" fill="#00bcd4" opacity="0.9"/>
    <rect x="117" y="25" width="30" height="25" rx="3" fill="#26c6da" opacity="0.9"/>
    <!-- Wasser -->
